<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  <title>Calculator</title>
</head>

<body>
  <div class="wrapper">
    <div class="calculator">
      <div class="calculator__display">
        <div class="calculator__operation-line"></div>
        <div class="calculator__number-line">0</div>
      </div>
      <div class="calculator__buttons">
        <button class="calculator__button calculator__button--size-double calculator__button--type-clear">CLEAR</button>
        <button class="calculator__button calculator__button--type-del">del</button>
        <button class="calculator__button calculator__button--type-operator">/</button>
        <button class="calculator__button calculator__button--type-number">7</button>
        <button class="calculator__button calculator__button--type-number">8</button>
        <button class="calculator__button calculator__button--type-number">9</button>
        <button class="calculator__button calculator__button--type-operator">*</button>
        <button class="calculator__button calculator__button--type-number">4</button>
        <button class="calculator__button calculator__button--type-number">5</button>
        <button class="calculator__button calculator__button--type-number">6</button>
        <button class="calculator__button calculator__button--type-operator">-</button>
        <button class="calculator__button calculator__button--type-number">1</button>
        <button class="calculator__button calculator__button--type-number">2</button>
        <button class="calculator__button calculator__button--type-number">3</button>
        <button class="calculator__button calculator__button--type-operator">+</button>
        <button class="calculator__button calculator__button--size-double calculator__button--type-number">0</button>
        <button class="calculator__button calculator__button--type-number">.</button>
        <button class="calculator__button calculator__button--type-operator">=</button>
      </div>
    </div>
  </div>

</body>

</html>
