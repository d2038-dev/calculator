<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  <title>Calculator</title>
</head>

<body>
  <div class="wrapper">
    <div class="calculator">
      <div class="calculator__display">
        <div class="calculator__operation-line">1234567890+1234567890</div>
        <div class="calculator__number-line">123456789012</div>
      </div>
      <div class="calculator__buttons">
        <div class="calculator__button calculator__button--size-double calculator__button--type-clear">CLEAR</div>
        <div class="calculator__button calculator__button--type-del">del</div>
        <div class="calculator__button calculator__button--type-operator">/</div>
        <div class="calculator__button calculator__button--type-number">7</div>
        <div class="calculator__button calculator__button--type-number">8</div>
        <div class="calculator__button calculator__button--type-number">9</div>
        <div class="calculator__button calculator__button--type-operator">*</div>
        <div class="calculator__button calculator__button--type-number">4</div>
        <div class="calculator__button calculator__button--type-number">5</div>
        <div class="calculator__button calculator__button--type-number">6</div>
        <div class="calculator__button calculator__button--type-operator">-</div>
        <div class="calculator__button calculator__button--type-number">1</div>
        <div class="calculator__button calculator__button--type-number">2</div>
        <div class="calculator__button calculator__button--type-number">3</div>
        <div class="calculator__button calculator__button--type-operator">+</div>
        <div class="calculator__button calculator__button--size-double calculator__button--type-number">0</div>
        <div class="calculator__button calculator__button--type-number">.</div>
        <div class="calculator__button calculator__button--type-operator">=</div>
      </div>
    </div>
  </div>

</body>

</html>
